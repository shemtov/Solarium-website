<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולאריום אנרגיה</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Solarium Energy</div>
            <ul>
                <li><a href="#home">בית</a></li>
                <li><a href="#projects">פרויקטים</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>עוברים לאנרגיה ירוקה עם סולאריום</h1>
        <p>התקנת מערכות סולאריות מתקדמות לבית ולעסק</p>
        <a href="#contact" class="btn">דברו איתנו</a>
    </section>

    <section id="projects">
        <h2>הפרויקטים שלנו</h2>
        <div id="gallery" class="projects-gallery">
            </div>
    </section>

    <section id="contact">
        <h2>צרו קשר</h2>
        <p>טלפון: 05X-XXXXXXX</p>
        <p>מייל: office@solarium-energy.co.il</p>
    </section>

    <script>
        // רשימת שמות התמונות שראיתי בצילום המסך שלך (image_0ad999.png)
        // אם העלית תמונות חדשות, פשוט תוסיף את השם שלהן לרשימה למטה
        const myImages = [
            'IMG_20251105_123456.jpg', 
            'IMG_20251105_123457.jpg',
            'IMG_20251105_123458.jpg'
        ];

        function loadGallery() {
            const gallery = document.getElementById('gallery');
            // ערבוב אקראי
            myImages.sort(() => Math.random() - 0.5);

            myImages.forEach(name => {
                const img = document.createElement('img');
                img.src = 'images/' + name;
                img.onerror = function() { this.style.display = 'none'; }; // אם השם טועה, התמונה פשוט לא תופיע
                gallery.appendChild(img);
            });
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
