<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולאריום אנרגיה</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Solarium Energy</div>
            <ul>
                <li><a href="#home">בית</a></li>
                <li><a href="#projects">פרויקטים</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="projects">
        <h2>הפרויקטים שלנו</h2>
        <div id="gallery" class="projects-gallery"></div>
    </section>

    <script>
        // רשימה שסרקתי מהצילום מסך שלך - בדיוק כמו שהן בתיקייה
        const images = [
            'WhatsApp Image 2026-03-23 at 12.11.13_0ed6861a.jpg',
            'WhatsApp Image 2026-03-23 at 12.11.12_6d80d19e.jpg',
            'WhatsApp Image 2026-03-23 at 12.11.12_98980998.jpg',
            'WhatsApp Image 2026-03-23 at 12.11.11_6002778c.jpg',
            'WhatsApp Image 2026-03-23 at 12.11.11_b5329813.jpg',
            'WhatsApp Image 2026-03-23 at 12.11.10_c84a0961.jpg'
        ];

        function initGallery() {
            const gallery = document.getElementById('gallery');
            // ערבוב אקראי
            images.sort(() => Math.random() - 0.5);

            images.forEach(name => {
                const img = document.createElement('img');
                img.src = 'images/' + name;
                // אם תעלה תמונה חדשה בעתיד עם שם שונה, פשוט תגיד לי ואוסיף אותה לרשימה כאן בשנייה
                gallery.appendChild(img);
            });
        }
        window.onload = initGallery;
    </script>
</body>
</html>
