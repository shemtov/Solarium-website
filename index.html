<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולאריום אנרגיה - פתרונות אנרגיה סולארית</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Solarium Energy</div>
            <ul>
                <li><a href="#home">בית</a></li>
                <li><a href="#projects">פרויקטים</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>עוברים לאנרגיה ירוקה עם סולאריום</h1>
        <p>התקנת מערכות סולאריות מתקדמות לבית ולעסק</p>
        <a href="#contact" class="btn">דברו איתנו</a>
    </section>

    <section id="projects">
        <h2>הפרויקטים שלנו</h2>
        <div id="gallery" class="projects-gallery">
            </div>
    </section>

    <section id="contact">
        <h2>צרו קשר</h2>
        <p>טלפון: 05X-XXXXXXX</p>
        <p>מייל: office@solarium-energy.co.il</p>
    </section>

    <footer>
        <p>© 2026 סולאריום אנרגיה Ltd. כל הזכויות שמורות.</p>
    </footer>

    <script>
        function loadAutoGallery() {
            const gallery = document.getElementById('gallery');
            let imageFiles = [];
            for (let i = 1; i <= 20; i++) { imageFiles.push(`${i}.jpg`); }
            imageFiles.sort(() => Math.random() - 0.5);
            imageFiles.forEach(fileName => {
                const img = new Image();
                img.src = `images/${fileName}`;
                img.onload = function() {
                    const imgElement = document.createElement('img');
                    imgElement.src = this.src;
                    gallery.appendChild(imgElement);
                };
            });
        }
        window.onload = loadAutoGallery;
    </script>
</body>
</html>
