<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולאריום אנרגיה - פרויקטים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Solarium Energy</div>
            <ul>
                <li><a href="#home">בית</a></li>
                <li><a href="#projects">פרויקטים</a></li>
                <li><a href="#contact">צור קשר</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>עוברים לאנרגיה ירוקה עם סולאריום</h1>
        <p>התקנת מערכות סולאריות מתקדמות לבית ולעסק</p>
        <a href="#contact" class="btn">דברו איתנו</a>
    </section>

    <section id="projects">
        <h2>הפרויקטים שלנו</h2>
        <div id="gallery" class="projects-gallery">
            </div>
    </section>

    <section id="contact">
        <h2>צרו קשר</h2>
        <p>טלפון: 05X-XXXXXXX</p>
        <p>מייל: office@solarium-energy.co.il</p>
    </section>

    <footer>
        <p>© 2026 סולאריום אנרגיה Ltd. כל הזכויות שמורות.</p>
    </footer>

    <script>
        async function loadGallery() {
            const gallery = document.getElementById('gallery');
            try {
                // פנייה ל-GitHub כדי לקבל את רשימת הקבצים בתיקייה
                const response = await fetch('https://api.github.com/repos/shemtov/Solarium-website/contents/images');
                const files = await response.json();
                
                // סינון רק של תמונות וערבוב אקראי
                let images = files.filter(file => file.name.match(/\.(jpg|jpeg|png|webp)$/i));
                images.sort(() => Math.random() - 0.5);

                images.forEach(file => {
                    const img = document.createElement('img');
                    img.src = file.download_url;
                    img.alt = "פרויקט סולאריום";
                    gallery.appendChild(img);
                });
            } catch (e) {
                console.error("טעינת הגלריה נכשלה", e);
            }
        }
        window.onload = loadGallery;
    </script>
</body>
</html>
