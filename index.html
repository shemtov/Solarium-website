<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solarium Energy - גלריית פרויקטים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Solarium Energy - סולאריום אנרגיה</h1>
    </header>

    <main>
        <div id="gallery" class="gallery-container">
            </div>
    </main>

    <script>
        // רשימת התמונות המעודכנת הכוללת את הנתיב לתיקיית images
        const images = [
            "images/20231215_080729.jpg",
            "images/20250109_082326.jpg",
            "images/IMG-20220522-WA0003.jpg",
            "images/IMG-20250106-WA0001.jpeg",
            "images/IMG-20250109-WA0003.jpeg",
            "images/IMG_20200423_113905.jpg"
        ];

        const gallery = document.getElementById('gallery');

        images.forEach(image => {
            const imgElement = document.createElement('img');
            imgElement.src = image;
            imgElement.alt = "פרויקט סולאריום";
            imgElement.loading = "lazy";
            gallery.appendChild(imgElement);
        });
    </script>
</body>
</html>
