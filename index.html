<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סולאריום אנרגיה - Solarium Energy</title>
    <style>
        :root {
            --primary: #1a365d;
            --accent: #f6ad55;
            --bg: #f8f9fa;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: #333;
            scroll-behavior: smooth;
        }
        
        /* לוגו קבוע בצד ימין */
        .fixed-logo {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 120px;
            height: auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }
        header h1 { font-size: 3rem; margin: 0; }
        header p { font-size: 1.3rem; opacity: 0.9; margin-top: 10px; }

        .hero-section {
            max-width: 1000px;
            margin: -40px auto 40px;
            padding: 0 20px;
        }
        #hero-media {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #ddd;
        }

        nav {
            text-align: center;
            margin-bottom: 50px;
        }
        .btn-projects {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 18px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(246, 173, 85, 0.4);
        }
        .btn-projects:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(246, 173, 85, 0.5); }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: none; /* מוסתר בהתחלה */
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img, .card video { width: 100%; height: 300px; object-fit: cover; }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 40px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <img src="images/logo.png" alt="Solarium Energy Logo" class="fixed-logo" onerror="this.style.display='none'">

    <header>
        <h1>סולאריום אנרגיה</h1>
        <p>פתרונות אנרגיה מתקדמים לעתיד ירוק יותר</p>
    </header>

    <div class="hero-section">
        <img id="hero-media" src="" alt="פרויקט נבחר">
    </div>

    <nav>
        <button class="btn-projects" onclick="revealGallery()">לצפייה בפרויקטים שלנו</button>
    </nav>

    <main id="gallery" class="gallery-container">
        </main>

    <footer>
        <p>© 2026 Solarium Energy Ltd | איכות, אמינות ושירות מעל הכל</p>
    </footer>

    <script>
        const user = 'shemtov';
        const repo = 'Solarium-website';
        const folder = 'images';

        async function loadContent() {
            try {
                // סריקה אוטומטית של התיקייה ב-GitHub
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${folder}`);
                const files = await res.json();
                
                const gallery = document.getElementById('gallery');
                const hero = document.getElementById('hero-media');

                // סינון קבצים (רק תמונות ווידאו, ללא הלוגו)
                const mediaFiles = files.filter(f => 
                    f.name !== 'logo.png' && 
                    f.name.match(/\.(jpg|jpeg|png|mp4)$/i)
                );

                // הגדרת ה-Hero (תמונה ראשונה אקראית)
                const randomImg = mediaFiles.filter(f => !f.name.endsWith('.mp4'));
                if(randomImg.length > 0) {
                    hero.src = randomImg[Math.floor(Math.random() * randomImg.length)].download_url;
                }

                // בניית הגלריה
                mediaFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    let element;
                    if (file.name.endsWith('.mp4')) {
                        element = document.createElement('video');
                        element.controls = true;
                        element.muted = true;
                    } else {
                        element = document.createElement('img');
                        element.loading = "lazy";
                    }
                    
                    element.src = file.download_url;
                    card.appendChild(element);
                    gallery.appendChild(card);
                });

            } catch (err) {
                console.error("שגיאה בסריקת קבצים:", err);
            }
        }

        function revealGallery() {
            const gallery = document.getElementById('gallery');
            gallery.style.display = 'grid'; // חשיפת הגלריה
            setTimeout(() => {
                gallery.scrollIntoView({ behavior: 'smooth' });
            }, 50);
        }

        loadContent();
    </script>
</body>
</html>
